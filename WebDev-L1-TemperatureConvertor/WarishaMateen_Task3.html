<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="WarishaMateen_Task3.css">
</head>

<body>

    <main class="container">

        <h1>🌡️ Temperature Converter</h1>
        <p class="subtitle">Convert temperatures between Celsius, Fahrenheit, and Kelvin.</p>

        <div class="converter-box">

            <label for="temperature">Temperature Value</label>
            <input
                type="number"
                id="temperature"
                placeholder="Enter temperature">

            <label for="unit">Choose Unit</label>

            <select id="unit">
                <option value="celsius">Celsius (°C)</option>
                <option value="fahrenheit">Fahrenheit (°F)</option>
                <option value="kelvin">Kelvin (K)</option>
            </select>

            <button id="convertBtn">Convert Temperature</button>
            <button id="resetBtn">Reset</button>

            <p id="error"></p>

            <section class="result">
                <h2>Conversion Results</h2>

                <p id="celsiusResult">Celsius: --</p>
                <p id="fahrenheitResult">Fahrenheit: --</p>
                <p id="kelvinResult">Kelvin: --</p>
            </section>

        </div>

    </main>

    <script src="WarishaMateen_Task3.js"></script>

</body>
</html>
